version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: knowgap-postgres
    environment:
      POSTGRES_DB: knowgapdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowgap-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/knowgapdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      JWT_SECRET: knowgapSecretKeyknowgapSecretKeyknowgapSecretKeyknowgapSecretKey
      HF_API_TOKEN: ${HF_API_TOKEN:-}
      HF_MODEL: mistralai/Mistral-7B-Instruct-v0.2
      PORT: 8086
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: knowgap-frontend
    environment:
      REACT_APP_API_BASE_URL: http://localhost:8086
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
